<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EX 사업·업무 통합관리 시스템</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#001D6C;--navy2:#0A2D8A;--navy3:#1A3A9A;
  --green:#00A64F;--green2:#007A3A;
  --amber:#F59E0B;--red:#DC2626;--blue:#2563EB;--purple:#7C3AED;--teal:#0891B2;
  --bg:#EDF0F7;--surface:#FFFFFF;--border:#DDE3EF;
  --ink:#1A2045;--ink2:#4A5178;--ink3:#8B93B8;
  --sh1:0 1px 3px rgba(0,29,108,.08);
  --sh2:0 4px 12px rgba(0,29,108,.12);
  --sh3:0 8px 28px rgba(0,29,108,.18);
  --r:8px;
}
html,body{height:100%;overflow:hidden;font-family:"Malgun Gothic","Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:var(--bg);color:var(--ink);font-size:13px;}
body{display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{height:56px;background:var(--navy);flex-shrink:0;display:flex;align-items:center;padding:0 20px;gap:16px;box-shadow:0 2px 10px rgba(0,0,0,.35);}
.hdr-logo{display:flex;align-items:center;gap:10px;flex-shrink:0;text-decoration:none;}
.hdr-badge{width:36px;height:36px;background:var(--green);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;letter-spacing:-.5px;flex-shrink:0;}
.hdr-title{color:#fff;font-size:14px;font-weight:700;line-height:1.25;}
.hdr-title small{display:block;font-size:10px;font-weight:400;color:rgba(255,255,255,.55);margin-top:1px;}
.hdr-sep{width:1px;height:28px;background:rgba(255,255,255,.15);flex-shrink:0;}
.hdr-nav{display:flex;gap:3px;}
.nav-btn{padding:6px 13px;border-radius:6px;border:none;background:transparent;color:rgba(255,255,255,.6);cursor:pointer;font-size:13px;font-weight:500;transition:all 170ms;font-family:inherit;}
.nav-btn:hover{background:rgba(255,255,255,.1);color:#fff;}
.nav-btn.on{background:var(--green);color:#fff;}
.hdr-space{flex:1;}
.hdr-search{height:34px;padding:0 12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;font-size:13px;width:260px;font-family:inherit;}
.hdr-search::placeholder{color:rgba(255,255,255,.4);}
.hdr-search:focus{outline:none;background:rgba(255,255,255,.16);border-color:var(--green);}
.hdr-actions{display:flex;gap:8px;}

/* ── BUTTONS ── */
.btn{height:32px;padding:0 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all 170ms;display:inline-flex;align-items:center;gap:5px;font-family:inherit;white-space:nowrap;}
.btn-g{background:var(--green);color:#fff;}
.btn-g:hover{background:var(--green2);box-shadow:0 2px 10px rgba(0,166,79,.4);}
.btn-ol{background:transparent;color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.25);}
.btn-ol:hover{background:rgba(255,255,255,.1);color:#fff;}
.btn-sm{height:28px;padding:0 10px;font-size:12px;}
.btn-ghost{height:28px;padding:0 10px;font-size:12px;background:var(--bg);color:var(--ink2);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:inherit;transition:all 150ms;}
.btn-ghost:hover{background:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{background:#B91C1C;}

/* ── MAIN / VIEWS ── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 18px;display:flex;flex-direction:column;gap:10px;}
.view{display:none;flex-direction:column;gap:10px;}
.view.on{display:flex;}

/* ── CARDS ── */
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh1);}
.card-hd{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.card-ht{font-size:13px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-g{background:var(--green);}
.dot-n{background:var(--navy);}
.dot-a{background:var(--amber);}
.dot-r{background:var(--red);}
.dot-b{background:var(--blue);}
.card-bd{padding:12px 16px;}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 15px;box-shadow:var(--sh1);position:relative;overflow:hidden;cursor:default;}
.kpi::after{content:'';position:absolute;right:-14px;top:-14px;width:64px;height:64px;border-radius:50%;opacity:.07;}
.kpi-n::after{background:var(--navy);}
.kpi-g::after{background:var(--green);}
.kpi-b::after{background:var(--blue);}
.kpi-r::after{background:var(--red);}
.kpi-a::after{background:var(--amber);}
.kpi-p::after{background:var(--purple);}
.kpi-ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:9px;}
.kpi-n .kpi-ic{background:rgba(0,29,108,.1);}
.kpi-g .kpi-ic{background:rgba(0,166,79,.1);}
.kpi-b .kpi-ic{background:rgba(37,99,235,.1);}
.kpi-r .kpi-ic{background:rgba(220,38,38,.1);}
.kpi-a .kpi-ic{background:rgba(245,158,11,.1);}
.kpi-p .kpi-ic{background:rgba(124,58,237,.1);}
.kpi-lb{font-size:10px;color:var(--ink3);font-weight:700;letter-spacing:.3px;text-transform:uppercase;}
.kpi-vl{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1;margin-top:2px;}
.kpi-n .kpi-vl{color:var(--navy);}
.kpi-g .kpi-vl{color:var(--green2);}
.kpi-b .kpi-vl{color:var(--blue);}
.kpi-r .kpi-vl{color:var(--red);}
.kpi-a .kpi-vl{color:#B45309;}
.kpi-p .kpi-vl{color:var(--purple);}
.kpi-sb{font-size:11px;color:var(--ink3);margin-top:3px;}

/* ── SCHEDULE SECTION ── */
.sched-sec{display:grid;grid-template-columns:285px 1fr;gap:10px;}
.today-pnl{display:flex;flex-direction:column;}
.tv-toggle{display:flex;gap:4px;}
.tv-btn{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);cursor:pointer;background:var(--bg);color:var(--ink2);transition:all 150ms;font-family:inherit;}
.tv-btn.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.today-list{display:flex;flex-direction:column;gap:5px;margin-top:8px;overflow-y:auto;max-height:240px;}
.si{padding:7px 10px;border-radius:6px;border-left:3px solid var(--green);background:var(--bg);cursor:pointer;transition:background 130ms;}
.si:hover{background:#e3e8f2;}
.si.si-mt{border-left-color:var(--blue);}
.si.si-rp{border-left-color:var(--amber);}
.si.si-ug{border-left-color:var(--red);}
.si.si-dn{border-left-color:var(--ink3);opacity:.65;}
.si-time{font-size:10px;color:var(--ink3);}
.si-nm{font-size:12px;font-weight:700;color:var(--ink);margin-top:1px;}
.si-pj{font-size:10px;color:var(--ink3);margin-top:1px;}

/* ── WEEK CALENDAR ── */
.week-cal{overflow-x:auto;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);min-width:560px;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.wdh{padding:7px 4px;text-align:center;font-size:11px;font-weight:700;background:var(--navy);color:rgba(255,255,255,.8);border-right:1px solid rgba(255,255,255,.1);}
.wdh:last-child{border-right:none;}
.wdh.wk{color:rgba(255,200,60,.9);}
.wdc{min-height:200px;border-right:1px solid var(--border);border-top:1px solid var(--border);padding:6px;background:#fff;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:background 120ms;}
.wdc:last-child{border-right:none;}
.wdc:hover{background:#F5F9FF;}
.wdc.wdc-t{background:#F0FDF4;border-top-color:var(--green);}
.wdc.wdc-w{background:#FAFBFE;}
.wdn{font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:2px;font-variant-numeric:tabular-nums;}
.wdc-t .wdn{color:var(--green2);}
.wev{font-size:10px;padding:2px 5px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.wev:hover{opacity:.8;}
.ev-g{background:#D1FAE5;color:#065F46;}
.ev-b{background:#DBEAFE;color:#1E40AF;}
.ev-a{background:#FEF3C7;color:#92400E;}
.ev-r{background:#FEE2E2;color:#991B1B;}
.ev-p{background:#EDE9FE;color:#4C1D95;}

/* ── MID ROW ── */
.mid-row{display:grid;grid-template-columns:1fr 258px;gap:10px;}
.risk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;}
.rc{border:1px solid var(--border);border-radius:6px;padding:12px;background:#fff;cursor:pointer;transition:all 170ms;position:relative;}
.rc:hover{box-shadow:var(--sh2);transform:translateY(-1px);}
.rc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:6px 0 0 6px;}
.rc.rc-h::before{background:var(--red);}
.rc.rc-m::before{background:var(--amber);}
.rc-nm{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:4px;line-height:1.35;}
.rc-mt{font-size:11px;color:var(--ink3);margin-bottom:6px;display:flex;gap:8px;}
.rc-pg{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;}
.rc-pf{height:100%;border-radius:2px;}
.rc-pf.ok{background:var(--green);}
.rc-pf.wn{background:var(--amber);}
.rc-pf.ov{background:var(--red);}
.rc-bt{display:flex;justify-content:space-between;align-items:center;margin-top:5px;font-size:11px;}

/* ── DEADLINES ── */
.dl-list{display:flex;flex-direction:column;gap:6px;}
.dl-it{display:flex;gap:9px;align-items:flex-start;padding:7px 9px;background:var(--bg);border-radius:6px;cursor:pointer;transition:background 130ms;}
.dl-it:hover{background:#e3e8f2;}
.dl-d{flex-shrink:0;width:40px;text-align:center;}
.dl-num{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;}
.dl-num.ug{color:var(--red);}
.dl-num.wn{color:var(--amber);}
.dl-num.ok{color:var(--green2);}
.dl-lb{font-size:9px;color:var(--ink3);}
.dl-info{flex:1;min-width:0;}
.dl-nm{font-size:11px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dl-dt{font-size:10px;color:var(--ink3);margin-top:2px;}

/* ── TABLE ── */
.tbl-bar{display:flex;gap:7px;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.tbl-q{height:30px;padding:0 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg);color:var(--ink);width:190px;font-family:inherit;}
.tbl-q:focus{outline:none;border-color:var(--green);background:#fff;}
.tbl-sel{height:30px;padding:0 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg);color:var(--ink2);cursor:pointer;font-family:inherit;}
.tbl-sel:focus{outline:none;}
.tbl-sp{flex:1;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:#F3F5FA;}
th{padding:8px 11px;text-align:left;font-weight:700;color:var(--ink2);font-size:11px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
th:hover{color:var(--navy);}
th .sa{color:var(--ink3);margin-left:3px;}
th.as{color:var(--green2);}
td{padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--ink);}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background 120ms;cursor:pointer;}
tbody tr:hover td{background:#F5F9FF;}
.td-nm{font-weight:700;}
.td-am{font-variant-numeric:tabular-nums;font-weight:700;color:var(--navy);}
.td-dt{font-variant-numeric:tabular-nums;color:var(--ink2);white-space:nowrap;}
.pw{display:flex;align-items:center;gap:5px;min-width:90px;}
.pb{flex:1;height:5px;background:var(--bg);border-radius:2px;overflow:hidden;}
.pf{height:100%;border-radius:2px;}
.pp{font-size:11px;font-variant-numeric:tabular-nums;font-weight:700;color:var(--ink2);min-width:30px;text-align:right;}

/* ── SCHEDULE VIEW ── */
.cal-nav{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);}
.cal-ml{font-size:15px;font-weight:700;color:var(--ink);min-width:90px;text-align:center;}
.cal-nb{width:28px;height:28px;border:1px solid var(--border);background:#fff;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 140ms;}
.cal-nb:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.cdh{padding:8px 4px;text-align:center;font-size:11px;font-weight:700;background:var(--navy);color:rgba(255,255,255,.8);}
.cdh.wk{color:rgba(255,200,60,.9);}
.cdc{min-height:100px;border-right:1px solid var(--border);border-top:1px solid var(--border);padding:5px;background:#fff;cursor:pointer;transition:background 120ms;display:flex;flex-direction:column;gap:2px;}
.cdc:last-child{border-right:none;}
.cdc:hover{background:#F0FDF4;}
.cdc.td{background:#F0FDF4;border-top:2px solid var(--green);}
.cdc.om{background:#FAFBFE;}
.cdn{font-size:12px;font-weight:700;color:var(--ink3);font-variant-numeric:tabular-nums;margin-bottom:2px;}
.cdc.td .cdn{color:var(--green2);}
.cev{font-size:10px;padding:2px 5px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── BADGES ── */
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap;}
.bd-ip{background:#DBEAFE;color:#1E40AF;}
.bd-dn{background:#D1FAE5;color:#065F46;}
.bd-hd{background:#FEF3C7;color:#92400E;}
.bd-pl{background:#EDE9FE;color:#4C1D95;}
.bd-rg{background:#FEE2E2;color:#991B1B;}
.bd-am{background:#FEF3C7;color:#92400E;}
.bd-ok{background:#D1FAE5;color:#065F46;}
.cat-c{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:#F1F5F9;color:var(--ink2);}

/* ── MODALS ── */
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:800;align-items:center;justify-content:center;}
.ovl.open{display:flex;}
.mod{background:#fff;border-radius:12px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh3);}
.mod.wide{max-width:860px;}
.mod-hd{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2;}
.mod-hd h3{font-size:16px;font-weight:700;color:var(--ink);}
.mod-x{width:28px;height:28px;border:none;background:var(--bg);border-radius:6px;cursor:pointer;font-size:14px;color:var(--ink2);display:flex;align-items:center;justify-content:center;transition:all 140ms;}
.mod-x:hover{background:var(--red);color:#fff;}
.mod-bd{padding:18px 22px;}
.mod-ft{padding:12px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:#fff;}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--ink2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px;}
.fi{width:100%;height:34px;padding:0 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:#fff;color:var(--ink);transition:border-color 150ms;font-family:inherit;}
.fi:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(0,166,79,.1);}
.f2c{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.f3c{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.mod-tabs{display:flex;gap:2px;padding:12px 22px 0;border-bottom:1px solid var(--border);}
.mtab{padding:7px 13px;border-radius:6px 6px 0 0;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;border-bottom:none;color:var(--ink3);background:transparent;transition:all 140ms;font-family:inherit;}
.mtab.on{background:#fff;border-color:var(--border);color:var(--ink);margin-bottom:-1px;}
.mpane{display:none;padding:18px 22px;}
.mpane.on{display:block;}

/* ── STAGE EDITOR ── */
.sr{display:flex;gap:7px;align-items:center;padding:7px 9px;background:var(--bg);border-radius:6px;margin-bottom:5px;}
.s-ck{width:16px;height:16px;cursor:pointer;accent-color:var(--green);}
.s-nm{flex:1;height:28px;padding:0 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:#fff;font-family:inherit;}
.s-nm:focus{outline:none;border-color:var(--green);}
.s-dt{width:115px;height:28px;padding:0 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:#fff;font-family:inherit;}
.s-dt:focus{outline:none;border-color:var(--green);}
.s-dl{width:24px;height:24px;border:none;background:transparent;color:var(--ink3);cursor:pointer;border-radius:4px;font-size:13px;transition:all 140ms;}
.s-dl:hover{background:#FEE2E2;color:var(--red);}
.tpls{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px;}
.tpl{padding:3px 10px;border-radius:12px;border:1px dashed var(--border);font-size:11px;color:var(--ink2);cursor:pointer;transition:all 140ms;background:#fff;font-family:inherit;}
.tpl:hover{border-color:var(--green);color:var(--green2);background:#F0FDF4;}

/* ── GANTT MINI ── */
.gm-wrap{overflow-x:auto;}
.gm-hdr{display:flex;min-width:500px;background:var(--navy);border-radius:6px 6px 0 0;overflow:hidden;}
.gm-hl{flex-shrink:0;width:160px;padding:7px 10px;font-size:11px;font-weight:700;color:rgba(255,255,255,.65);border-right:1px solid rgba(255,255,255,.1);}
.gm-hm{flex:1;display:flex;}
.gm-hmc{flex-shrink:0;padding:7px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,.65);border-right:1px solid rgba(255,255,255,.1);text-align:center;}
.gm-body{min-width:500px;border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;overflow:hidden;}
.gm-row{display:flex;border-bottom:1px solid var(--border);height:32px;}
.gm-row:last-child{border-bottom:none;}
.gm-lbl{flex-shrink:0;width:160px;padding:0 10px;font-size:11px;display:flex;align-items:center;background:#F5F7FC;border-right:1px solid var(--border);font-weight:600;color:var(--ink);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.gm-tl{flex:1;position:relative;overflow:hidden;}
.gm-bar{position:absolute;top:6px;height:20px;border-radius:3px;font-size:9px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;white-space:nowrap;overflow:hidden;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;padding:11px 17px;border-radius:8px;color:#fff;font-size:13px;font-weight:600;box-shadow:var(--sh3);z-index:9999;animation:ti 220ms ease;}
.toast.ok{background:var(--green);}
.toast.err{background:var(--red);}
@keyframes ti{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* ── MISC ── */
.empty{text-align:center;padding:32px 16px;color:var(--ink3);font-size:13px;}
.empty-ic{font-size:32px;margin-bottom:7px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(0,29,108,.14);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(0,29,108,.25);}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-logo">
    <div class="hdr-badge">EX</div>
    <div class="hdr-title">사업·업무 통합관리<small>한국도로공사 Korea Expressway Corporation</small></div>
  </div>
  <div class="hdr-sep"></div>
  <nav class="hdr-nav">
    <button class="nav-btn on" onclick="sw('d')">대시보드</button>
    <button class="nav-btn" onclick="sw('p')">사업 목록</button>
    <button class="nav-btn" onclick="sw('s')">일정 관리</button>
  </nav>
  <div class="hdr-space"></div>

<script>
const S={projects:[],schedules:[],cats:[],tv:'my',view:'d',curId:null,editPId:null,editSId:null,sCurTab:'info',calMo:new Date(),sc:'end',sd:1};
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const DKO=['일','월','화','수','목','금','토'];

function uid(){return '_'+Math.random().toString(36).slice(2,9);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtD(ds){if(!ds)return'-';const p=ds.split('-');return `${p[0]}.${+p[1]}.${+p[2]}`;}
function fmtA(n){n=+n;if(!n)return'-';if(n>=100000000)return(n/100000000).toFixed(1)+'억원';if(n>=10000)return Math.round(n/10000)+'만원';return n.toLocaleString()+'원';}
function du(ds){if(!ds)return 9999;const d=new Date(ds);d.setHours(0,0,0,0);return Math.round((d-TODAY)/864e5);}
function dy(n){const d=new Date(TODAY);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}

function sv(){localStorage.setItem('rv3:p',JSON.stringify(S.projects));localStorage.setItem('rv3:s',JSON.stringify(S.schedules));localStorage.setItem('rv3:c',JSON.stringify(S.cats));}
function ld(){try{S.projects=JSON.parse(localStorage.getItem('rv3:p')||'[]');S.schedules=JSON.parse(localStorage.getItem('rv3:s')||'[]');S.cats=JSON.parse(localStorage.getItem('rv3:c')||'[]');}catch(e){S.projects=[];S.schedules=[];S.cats=[];}}

function sw(v){
  S.view=v;
  ['d','p','s'].forEach(x=>document.getElementById('v'+x).classList.toggle('on',x===v));
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('on',['d','p','s'][i]===v));
  if(v==='d')renderDash();
  else if(v==='p')rt2();
  else if(v==='s')renderCal();
}
function onQ(){if(S.view==='d')renderDash();else if(S.view==='p')rt2();}

/* ── HELPERS ── */
function pProg(p){if(!p.stages||!p.stages.length)return 0;return Math.round(p.stages.filter(s=>s.done).length/p.stages.length*100);}
function pSt(p){
  if(p.status&&p.status!=='진행중')return p.status;
  if(du(p.startDate)>0)return '계획';
  if(pProg(p)>=100||du(p.endDate)<0)return '완료';
  return '진행중';
}
function isRisk(p){
  const st=pSt(p);if(st==='완료'||st==='계획')return false;
  const d=du(p.endDate),pr=pProg(p);
  return(d>=0&&d<=60&&pr<50)||(d>=0&&d<=30);
}
function stBadge(st){const m={진행중:'bd-ip',완료:'bd-dn',대기:'bd-hd',계획:'bd-pl'};return `<span class="badge ${m[st]||'bd-ip'}">${esc(st)}</span>`;}
function pBar(pr){const c=pr>=70?'var(--green)':pr>=40?'var(--amber)':'var(--red)';return `<div class="pw"><div class="pb"><div class="pf" style="width:${pr}%;background:${c};"></div></div><span class="pp">${pr}%</span></div>`;}

/* ── PROJECT CRUD ── */
function openPM(id){
  S.editPId=id||null;
  document.getElementById('pmTt').textContent=id?'사업 수정':'새 사업 등록';
  const p=id?S.projects.find(x=>x.id===id):null;
  document.getElementById('pmNm').value=p?.name||'';
  document.getElementById('pmCt').value=p?.cat||'';
  document.getElementById('pmSt').value=p?.status||'진행중';
  document.getElementById('pmCl').value=p?.client||'';
  document.getElementById('pmMg').value=p?.mgrs?.join(', ')||'';
  document.getElementById('pmAm').value=p?.amt||'';
  document.getElementById('pmSd').value=p?.startDate||'';
  document.getElementById('pmEd').value=p?.endDate||'';
  document.getElementById('pmNo').value=p?.note||'';
  document.getElementById('pmCtL').innerHTML=S.cats.map(c=>`<option value="${esc(c)}">`).join('');
  openOv('pmOv');
}
function svProj(){
  const name=document.getElementById('pmNm').value.trim();
  const cat=document.getElementById('pmCt').value.trim();
  const sd=document.getElementById('pmSd').value;
  const ed=document.getElementById('pmEd').value;
  if(!name){toast('사업명을 입력하세요','err');return;}
  if(!cat){toast('분류를 입력하세요','err');return;}
  if(!sd||!ed){toast('기간을 입력하세요','err');return;}
  const data={name,cat,status:document.getElementById('pmSt').value,client:document.getElementById('pmCl').value.trim(),mgrs:document.getElementById('pmMg').value.split(',').map(x=>x.trim()).filter(Boolean),amt:+document.getElementById('pmAm').value||0,startDate:sd,endDate:ed,note:document.getElementById('pmNo').value.trim()};
  if(S.editPId){
    const p=S.projects.find(x=>x.id===S.editPId);
    if(p)Object.assign(p,data);
    toast('수정되었습니다');
  }else{
    const p={id:uid(),stages:[],createdAt:new Date().toISOString(),...data};
    p.stages=[{id:uid(),name:'착수',startDate:sd,endDate:sd,done:du(sd)<0},{id:uid(),name:'수행',startDate:sd,endDate:ed,done:false},{id:uid(),name:'준공',startDate:ed,endDate:ed,done:false}];
    S.projects.push(p);toast('등록되었습니다');
  }
  if(!S.cats.includes(cat))S.cats.push(cat);
  sv();closeOv('pmOv');
  if(S.view==='d')renderDash();else rt2();
}
function openDetail(id){
  S.curId=id;
  const p=S.projects.find(x=>x.id===id);if(!p)return;
  document.getElementById('dmTt').textContent=p.name;
  setTab('info');openOv('dmOv');
}
function setTab(t){
  S.sCurTab=t;
  document.querySelectorAll('.mtab').forEach((b,i)=>b.classList.toggle('on',['info','stage','gantt'][i]===t));
  document.querySelectorAll('.mpane').forEach(x=>x.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
  const p=S.projects.find(x=>x.id===S.curId);if(!p)return;
  if(t==='info')rDmInfo(p);
  else if(t==='stage')rDmStage(p);
  else if(t==='gantt')rDmGantt(p);
}
function rDmInfo(p){
  const pr=pProg(p);
  const c=pr>=70?'var(--green)':pr>=40?'var(--amber)':'var(--red)';
  document.getElementById('tab-info').innerHTML=`
    <div class="f2c" style="margin-bottom:13px;">
      <div><label style="font-size:11px;font-weight:700;color:var(--ink3);display:block;margin-bottom:4px;text-transform:uppercase;">분류</label><span class="cat-c">${esc(p.cat)}</span></div>
      <div><label style="font-size:11px;font-weight:700;color:var(--ink3);display:block;margin-bottom:4px;text-transform:uppercase;">상태</label>${stBadge(pSt(p))}</div>
    </div>
    <div class="f2c" style="margin-bottom:13px;">
      <div><label style="font-size:11px;font-weight:700;color:var(--ink3);display:block;margin-bottom:4px;text-transform:uppercase;">발주처</label><span style="font-size:13px;">${esc(p.client||'-')}</span></div>
      <div><label style="font-size:11px;font-weight:700;color:var(--ink3);display:block;margin-bottom:4px;text-transform:uppercase;">담당자</label><span style="font-size:13px;">${esc(p.mgrs?.join(', ')||'-')}</span></div>
    </div>
    <div class="f3c" style="margin-bottom:13px;">
      <div><label style="font-size:11px;font-weight:700;color:var(--ink3);display:block;margin-bottom:4px;text-transform:uppercase;">계약금액</label><span style="font-size:14px;font-weight:800;color:var(--navy);">${fmtA(p.amt)}</span></div>
      <div><label style="font-size:11px;font-weight:700;color:var(--ink3);display:block;margin-bottom:4px;text-transform:uppercase;">착수일</label><span style="font-size:13px;">${fmtD(p.startDate)}</span></div>
      <div><label style="font-size:11px;font-weight:700;color:var(--ink3);display:block;margin-bottom:4px;text-transform:uppercase;">준공일</label><span style="font-size:13px;">${fmtD(p.endDate)}</span></div>
    </div>
    <div style="margin-bottom:13px;">
      <label style="font-size:11px;font-weight:700;color:var(--ink3);display:block;margin-bottom:6px;text-transform:uppercase;">진행률 ${pr}%</label>
      <div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden;"><div style="height:100%;width:${pr}%;background:${c};border-radius:4px;transition:width 350ms;"></div></div>
    </div>
    ${p.note?`<div><label style="font-size:11px;font-weight:700;color:var(--ink3);display:block;margin-bottom:4px;text-transform:uppercase;">비고</label><span style="font-size:13px;color:var(--ink2);">${esc(p.note)}</span></div>`:''}`;
}
function rDmStage(p){
  const tpls=['착수','기본설계','실시설계','시공','검수','준공','중간보고','최종보고','자료제출','협의'];
  let h=`<div style="margin-bottom:10px;"><div style="font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px;">템플릿 빠른추가</div><div class="tpls">${tpls.map(t=>`<button class="tpl" onclick="addStg('${esc(p.id)}','${esc(t)}')">${esc(t)}</button>`).join('')}</div></div><div id="stgList">`;
  p.stages.forEach(s=>{
    h+=`<div class="sr"><input type="checkbox" class="s-ck" ${s.done?'checked':''} onchange="togStg('${p.id}','${s.id}',this.checked)"><input class="s-nm" value="${esc(s.name)}" oninput="updStg('${p.id}','${s.id}','name',this.value)" placeholder="단계명"><input type="date" class="s-dt" value="${s.startDate||''}" oninput="updStg('${p.id}','${s.id}','startDate',this.value)" title="시작일"><span style="font-size:11px;color:var(--ink3);">~</span><input type="date" class="s-dt" value="${s.endDate||''}" oninput="updStg('${p.id}','${s.id}','endDate',this.value)" title="종료일"><button class="s-dl" onclick="delStg('${p.id}','${s.id}')">✕</button></div>`;
  });
  h+=`</div><button class="btn btn-g btn-sm" style="margin-top:9px;" onclick="addStg('${p.id}','')">+ 단계 추가</button>`;
  document.getElementById('tab-stage').innerHTML=h;
}
function addStg(pid,name){const p=S.projects.find(x=>x.id===pid);if(!p)return;p.stages.push({id:uid(),name:name||'',startDate:p.startDate,endDate:p.endDate,done:false});sv();rDmStage(p);}
function delStg(pid,sid){const p=S.projects.find(x=>x.id===pid);if(!p)return;p.stages=p.stages.filter(s=>s.id!==sid);sv();rDmStage(p);}
function updStg(pid,sid,k,v){const p=S.projects.find(x=>x.id===pid);const s=p?.stages.find(x=>x.id===sid);if(s){s[k]=v;sv();rKPI();rRisk();}}
function togStg(pid,sid,done){const p=S.projects.find(x=>x.id===pid);const s=p?.stages.find(x=>x.id===sid);if(s){s.done=done;sv();rKPI();rRisk();}}
function rDmGantt(p){
  if(!p.stages||!p.stages.length){document.getElementById('tab-gantt').innerHTML='<div class="empty">추진단계를 먼저 등록하세요</div>';return;}
  const mos=getMoRange(p.startDate,p.endDate);
  const MW=75;
  let h=`<div class="gm-wrap"><div class="gm-hdr"><div class="gm-hl">단계명</div><div class="gm-hm">`;
  mos.forEach(m=>{const[y,mo]=m.split('-');h+=`<div class="gm-hmc" style="width:${MW}px;">${+y}년 ${+mo}월</div>`;});
  h+=`</div></div><div class="gm-body">`;
  p.stages.forEach(s=>{
    const lft=barLeft(s.startDate,mos,MW);
    const wid=Math.max(barWid(s.startDate,s.endDate,mos,MW),10);
    const clr=s.done?'var(--green)':'var(--blue)';
    h+=`<div class="gm-row"><div class="gm-lbl">${s.done?'✓ ':''}<span>${esc(s.name)}</span></div><div class="gm-tl" style="width:${mos.length*MW}px;"><div class="gm-bar" style="left:${lft}px;width:${wid}px;background:${clr};" title="${esc(s.name)}"><span style="padding:0 4px;overflow:hidden;">${s.name.length<=5?esc(s.name):''}</span></div></div></div>`;
  });
  h+=`</div></div>`;
  document.getElementById('tab-gantt').innerHTML=h;
}
function getMoRange(sd,ed){
  const r=[];let d=new Date(sd);d.setDate(1);const e=new Date(ed);e.setDate(1);
  while(d<=e){r.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);d.setMonth(d.getMonth()+1);}
  return r;
}
function barLeft(ds,mos,mw){
  if(!ds||!mos.length)return 0;
  const[y,m]=mos[0].split('-').map(Number);
  const ms=new Date(y,m-1,1);
  const[ey,em]=mos[mos.length-1].split('-').map(Number);
  const me=new Date(ey,em,0);
  const tot=(me-ms)/864e5+1;
  const frm=Math.max(0,(new Date(ds)-ms)/864e5);
  return frm/tot*mos.length*mw;
}
function barWid(sd,ed,mos,mw){
  if(!sd||!ed||!mos.length)return mw;
  const[y,m]=mos[0].split('-').map(Number);
  const ms=new Date(y,m-1,1);
  const[ey,em]=mos[mos.length-1].split('-').map(Number);
  const me=new Date(ey,em,0);
  const tot=(me-ms)/864e5+1;
  const days=Math.max(1,(new Date(ed)-new Date(sd))/864e5+1);
  return days/tot*mos.length*mw;
}

function renderCal(){
  const y=S.calMo.getFullYear(),m=S.calMo.getMonth();
  document.getElementById('calLbl').textContent=`${y}년 ${m+1}월`;
  const fd=new Date(y,m,1).getDay(),ld=new Date(y,m+1,0).getDate();
  const tds=TODAY.toISOString().slice(0,10);
  const tc={업무:'ev-g',회의:'ev-b',보고:'ev-a',긴급:'ev-r',기타:'ev-p'};
  let h=DKO.map((d,i)=>`<div class="cdh${i===0||i===6?' wk':''}">${d}</div>`).join('');
  for(let i=0;i<fd;i++)h+=`<div class="cdc om"></div>`;
  for(let day=1;day<=ld;day++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isT=ds===tds;
    const dow=(fd+day-1)%7;const isW=dow===0||dow===6;
    const scs=S.schedules.filter(x=>x.date===ds);
    const ev=scs.slice(0,3).map(sc=>`<div class="cev ${tc[sc.type]||'ev-g'}" onclick="event.stopPropagation();openSM('${sc.id}')">${esc(sc.name)}</div>`).join('')+(scs.length>3?`<div style="font-size:10px;color:var(--ink3);">+${scs.length-3}건</div>`:'');
    h+=`<div class="cdc${isT?' td':''}${isW?' om':''}" onclick="openSM(null,'${ds}')"><div class="cdn">${day}</div>${ev}</div>`;
  }
  document.getElementById('calGrid').innerHTML=h;
}

  for(let i=-3;i<=10;i++){
    const cnt=i===0?5:i>0&&i<=5?3:2;
    for(let j=0;j<cnt;j++){
      const ds=dy(i);
      const pidx=Math.abs(i*3+j)%S.projects.length;
      S.schedules.push({id:uid(),done:i<0,name:sNm[Math.abs(i+j*3)%sNm.length],date:ds,time:['09:00','10:30','13:30','14:00','15:30','16:30'][(Math.abs(i)+j)%6],type:sTy[Math.abs(i+j)%5],owner:sOw[Math.abs(i*j+1)%sOw.length],projId:S.projects[pidx]?.id||'',note:''});
    }
  }
  sv();
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded',()=>{
  ld();
  S.calMo=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  if(!S.projects.length)createSample();
  renderDash();
});
</script>
