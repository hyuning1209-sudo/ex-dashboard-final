<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국도로공사 사업·업무 통합 관리 대시보드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Pretendard",sans-serif;background:#EAECF0;color:#1A202C;font-size:14px;}
:root{
  --blue:#0052CC;--blue-dark:#003D99;--blue-bg:#EBF2FF;
  --green:#16A34A;--green-bg:#DCFCE7;
  --red:#DC2626;--red-bg:#FEE2E2;
  --orange:#D97706;--orange-bg:#FEF3C7;
  --purple:#7C3AED;--purple-bg:#F3E8FF;
  --teal:#0891B2;--teal-bg:#CFFAFE;
  --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;
  --gray-400:#9CA3AF;--gray-500:#6B7280;--gray-600:#4B5563;--gray-700:#374151;--gray-800:#1F2937;
  --sh:0 1px 3px rgba(0,0,0,.08);--sh-md:0 4px 12px rgba(0,0,0,.12);
  --r:8px;--rs:6px;
}

/* ── LAYOUT ─────────────────────────────── */
body{display:flex;flex-direction:column;}
.header{height:54px;background:#fff;border-bottom:2.5px solid var(--blue);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,82,204,.12);}
.header-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:var(--blue);white-space:nowrap;}
.header-logo .sub{color:var(--gray-500);font-weight:500;font-size:12px;margin-left:2px;}
.header-nav{display:flex;gap:2px;}
.nav-btn{padding:5px 13px;border:none;background:transparent;color:var(--gray-600);border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:600;transition:all 120ms;}
.nav-btn:hover{background:var(--blue-bg);color:var(--blue);}
.nav-btn.active{background:var(--blue);color:#fff;}
.header-right{display:flex;gap:8px;align-items:center;}
.hdate{font-size:12px;color:var(--gray-400);margin-right:4px;}

/* ── MAIN ───────────────────────────────── */
.main{flex:1;overflow-y:auto;padding:12px 20px;display:flex;flex-direction:column;gap:10px;}

/* ── BUTTONS ────────────────────────────── */
.btn{padding:6px 12px;border-radius:var(--rs);cursor:pointer;font-size:12px;font-weight:700;border:none;transition:all 120ms;display:inline-flex;align-items:center;gap:4px;line-height:1.4;}
.btn-p{background:var(--blue);color:#fff;}.btn-p:hover{background:var(--blue-dark);}
.btn-s{background:#fff;color:var(--gray-700);border:1px solid var(--gray-300);}.btn-s:hover{background:var(--gray-50);}
.btn-d{background:var(--red);color:#fff;}.btn-d:hover{background:#B91C1C;}
.ico-btn{padding:4px 7px;background:#fff;border:1px solid var(--gray-300);color:var(--gray-500);border-radius:var(--rs);cursor:pointer;font-size:12px;transition:all 120ms;line-height:1;}
.ico-btn:hover{background:var(--gray-50);}

/* ── CARD ───────────────────────────────── */
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.ch{padding:10px 14px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.ct{font-size:13px;font-weight:700;color:var(--gray-800);display:flex;align-items:center;gap:5px;}
.cb{padding:12px 14px;}

/* ── KPI ROW ────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;flex-shrink:0;}
.kpi{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:12px 14px;display:flex;align-items:center;gap:12px;border-left:4px solid var(--blue);position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;right:-10px;top:-10px;width:60px;height:60px;border-radius:50%;opacity:.06;}
.kpi.k-green{border-left-color:var(--green);}
.kpi.k-red{border-left-color:var(--red);}
.kpi.k-orange{border-left-color:var(--orange);}
.kpi.k-teal{border-left-color:var(--teal);}
.kpi.k-purple{border-left-color:var(--purple);}
.kpi-icon{font-size:22px;line-height:1;flex-shrink:0;}
.kpi-body{flex:1;min-width:0;}
.kpi-val{font-size:22px;font-weight:800;color:var(--gray-800);line-height:1.1;}
.kpi-val.c-blue{color:var(--blue);}
.kpi-val.c-green{color:var(--green);}
.kpi-val.c-red{color:var(--red);}
.kpi-val.c-orange{color:var(--orange);}
.kpi-val.c-teal{color:var(--teal);}
.kpi-val.c-purple{color:var(--purple);}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.4px;margin-top:1px;}
.kpi-sub{font-size:10px;color:var(--gray-400);margin-top:2px;}
.kpi-bar{height:3px;background:var(--gray-200);border-radius:2px;margin-top:5px;overflow:hidden;}
.kpi-bar-fill{height:100%;border-radius:2px;background:var(--blue);}

/* ── SCHEDULE SECTION (today + week) ────── */
.sched-section{display:grid;grid-template-columns:280px 1fr;gap:10px;flex-shrink:0;}

/* Today timeline */
.today-card{display:flex;flex-direction:column;}
.today-card .cb{flex:1;padding:8px 12px;overflow-y:auto;max-height:240px;}
.toggle-row{display:flex;background:var(--gray-100);border-radius:14px;padding:2px;gap:0;}
.tgl{padding:3px 10px;border-radius:12px;border:none;background:transparent;font-size:11px;font-weight:700;cursor:pointer;color:var(--gray-400);transition:all 120ms;}
.tgl.on{background:#fff;color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.12);}
.timeline{display:flex;flex-direction:column;gap:6px;}
.tl-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--rs);background:var(--gray-50);border-left:3px solid var(--blue);transition:opacity 120ms;}
.tl-item.past{opacity:.5;border-left-color:var(--gray-300);}
.tl-item.now{background:var(--blue-bg);border-left-color:var(--blue);font-weight:700;}
.tl-item.dept{border-left-color:var(--purple);}
.tl-time{font-size:11px;font-weight:700;color:var(--blue);min-width:38px;}
.tl-item.dept .tl-time{color:var(--purple);}
.tl-text{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tl-tag{font-size:10px;padding:1px 5px;border-radius:8px;background:var(--blue-bg);color:var(--blue);font-weight:700;flex-shrink:0;}
.tl-tag.dept{background:var(--purple-bg);color:var(--purple);}
.tl-del{background:none;border:none;cursor:pointer;color:var(--gray-300);font-size:13px;padding:1px 3px;flex-shrink:0;}
.tl-del:hover{color:var(--red);}
.no-sched{text-align:center;color:var(--gray-400);font-size:12px;padding:16px 0;}

/* Week calendar */
.week-card{display:flex;flex-direction:column;}
.week-card .cb{flex:1;padding:8px 10px;}
.wcal{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;height:210px;}
.wday{border:1px solid var(--gray-200);border-radius:var(--rs);display:flex;flex-direction:column;overflow:hidden;}
.wday-hd{padding:4px 6px;text-align:center;background:var(--gray-100);border-bottom:1px solid var(--gray-200);flex-shrink:0;}
.wday-hd .dn{font-size:10px;font-weight:700;color:var(--gray-500);}
.wday-hd .dd{font-size:15px;font-weight:800;color:var(--gray-700);line-height:1.2;}
.wday.today .wday-hd{background:var(--blue);border-bottom-color:var(--blue-dark);}
.wday.today .wday-hd .dn{color:rgba(255,255,255,.8);}
.wday.today .wday-hd .dd{color:#fff;}
.wday-body{flex:1;padding:4px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;}
.wev{font-size:10px;padding:2px 5px;border-radius:3px;background:var(--blue-bg);color:var(--blue);cursor:pointer;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wev:hover{background:var(--blue);color:#fff;}
.wev.dept{background:var(--purple-bg);color:var(--purple);}
.wev.dept:hover{background:var(--purple);color:#fff;}
.wmore{font-size:9px;color:var(--gray-400);padding:1px 4px;}

/* ── MIDDLE ROW (risk + deadlines) ──────── */
.mid-row{display:grid;grid-template-columns:1fr 260px;gap:10px;flex-shrink:0;}
.risk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;padding:10px 12px;}
.rc{border-radius:var(--rs);border:1px solid var(--gray-200);padding:10px 12px;cursor:pointer;transition:box-shadow 120ms;position:relative;overflow:hidden;}
.rc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.rc.r-red::before{background:var(--red);}
.rc.r-orange::before{background:var(--orange);}
.rc:hover{box-shadow:var(--sh-md);}
.rc-tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;margin-bottom:5px;}
.rc.r-red .rc-tag{background:var(--red-bg);color:var(--red);}
.rc.r-orange .rc-tag{background:var(--orange-bg);color:var(--orange);}
.rc-name{font-size:12px;font-weight:700;color:var(--gray-800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.rc-meta{font-size:10px;color:var(--gray-500);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rc-pb{height:4px;background:var(--gray-200);border-radius:2px;overflow:hidden;}
.rc-pf{height:100%;border-radius:2px;}
.rc-pct{font-size:10px;font-weight:700;margin-top:3px;}
.no-risk{padding:24px;text-align:center;color:var(--gray-400);font-size:12px;}

/* Deadlines sidebar */
.dl-list{display:flex;flex-direction:column;gap:0;}
.dl-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--gray-100);cursor:pointer;transition:background 100ms;}
.dl-item:last-child{border-bottom:none;}
.dl-item:hover{background:var(--gray-50);}
.dl-badge{min-width:38px;text-align:center;font-size:11px;font-weight:700;padding:2px 4px;border-radius:4px;}
.dl-badge.r{background:var(--red-bg);color:var(--red);}
.dl-badge.o{background:var(--orange-bg);color:var(--orange);}
.dl-badge.g{background:var(--green-bg);color:var(--green);}
.dl-info{flex:1;min-width:0;}
.dl-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--gray-800);}
.dl-pb{height:3px;background:var(--gray-200);border-radius:2px;margin-top:3px;overflow:hidden;}
.dl-pf{height:100%;border-radius:2px;}

/* ── PROJECT TABLE ──────────────────────── */
.tb-toolbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.si{padding:6px 10px;border:1px solid var(--gray-300);border-radius:var(--rs);font-size:12px;background:#fff;color:#1A202C;}
.si:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(0,82,204,.10);}
.pt{width:100%;border-collapse:collapse;}
.pt th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--gray-500);text-transform:uppercase;border-bottom:2px solid var(--gray-200);background:var(--gray-50);white-space:nowrap;cursor:pointer;user-select:none;letter-spacing:.3px;}
.pt th:hover{color:var(--blue);}
.pt td{padding:8px 10px;border-bottom:1px solid var(--gray-100);font-size:12px;vertical-align:middle;}
.pt tbody tr:hover td{background:#F5F8FF;}
.pt tbody tr{cursor:pointer;transition:background 80ms;}
.pt tbody tr.risk-row td{background:#FFFAF5;}
.pn{font-weight:600;color:var(--gray-800);font-size:12px;}
.pc{font-size:10px;color:var(--gray-400);margin-top:1px;}
.bdg{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;}
.bdg-g{background:var(--green-bg);color:var(--green);}
.bdg-b{background:var(--blue-bg);color:var(--blue);}
.bdg-r{background:var(--red-bg);color:var(--red);}
.bdg-o{background:var(--orange-bg);color:var(--orange);}
.bdg-x{background:var(--gray-100);color:var(--gray-500);}
.pb-cell{display:flex;align-items:center;gap:5px;}
.pb-wrap{width:70px;height:5px;background:var(--gray-200);border-radius:3px;overflow:hidden;flex-shrink:0;}
.pb-fill{height:100%;border-radius:3px;}
.pb-pct{font-size:11px;font-weight:700;min-width:30px;}
.amt{font-size:11px;font-weight:600;color:var(--gray-700);text-align:right;white-space:nowrap;}
.mgr{font-size:11px;color:var(--gray-600);}
.em-row td{text-align:center;padding:32px;color:var(--gray-400);font-size:12px;}
.flag-cb{width:13px;height:13px;cursor:pointer;accent-color:var(--red);}
.cnt{display:inline-block;background:var(--blue);color:#fff;border-radius:8px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:3px;}

/* ── SECTION HEADER ─────────────────────── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:0;}

/* ── MODALS ─────────────────────────────── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;}
.ov.open{display:flex;}
.mdl{background:#fff;border-radius:12px;width:100%;max-width:660px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 40px rgba(0,0,0,.2);display:flex;flex-direction:column;}
.mdl.wide{max-width:860px;}
.mh{padding:16px 20px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mh h2{font-size:16px;font-weight:800;}
.mc-btn{background:none;border:none;font-size:18px;cursor:pointer;color:var(--gray-400);padding:3px;line-height:1;}
.mc-btn:hover{color:var(--gray-700);}
.mb{padding:18px 20px;flex:1;}
.mf{padding:12px 20px;border-top:1px solid var(--gray-200);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;}

/* Forms */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fitem{display:flex;flex-direction:column;gap:4px;}
.fitem.full{grid-column:1/-1;}
.flbl{font-size:11px;font-weight:700;color:var(--gray-600);}
.fi{padding:7px 9px;border:1px solid var(--gray-300);border-radius:var(--rs);font-size:13px;background:#fff;color:#1A202C;transition:border-color 120ms;width:100%;}
.fi:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(0,82,204,.10);}
.fhint{font-size:10px;color:var(--gray-400);}

/* Detail tabs */
.dtabs{display:flex;border-bottom:2px solid var(--gray-200);margin-bottom:14px;}
.dtab{padding:7px 14px;border:none;background:transparent;font-size:12px;font-weight:700;cursor:pointer;color:var(--gray-400);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 120ms;}
.dtab.on{color:var(--blue);border-bottom-color:var(--blue);}
.tp{display:none;}.tp.on{display:block;}
.ig{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.ii{background:var(--gray-50);border-radius:var(--rs);padding:9px 11px;}
.il{font-size:10px;color:var(--gray-500);font-weight:600;margin-bottom:2px;}
.iv{font-size:13px;font-weight:700;color:var(--gray-800);}

/* Stage management */
.sl{display:flex;flex-direction:column;gap:6px;}
.sr{display:flex;align-items:center;gap:7px;padding:7px 9px;border:1px solid var(--gray-200);border-radius:var(--rs);background:#fff;}
.sr.done{background:var(--green-bg);border-color:#BBF7D0;}
.sck{width:15px;height:15px;cursor:pointer;accent-color:var(--green);}
.sni{flex:1;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--gray-800);outline:none;}
.sdi{width:115px;border:1px solid var(--gray-200);border-radius:4px;font-size:11px;padding:3px 5px;color:var(--gray-600);}
.sdi:focus{outline:none;border-color:var(--blue);}
.sdel{background:none;border:none;cursor:pointer;color:var(--gray-300);font-size:14px;padding:1px;}
.sdel:hover{color:var(--red);}
.stpls{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.stp{font-size:10px;padding:2px 8px;border-radius:8px;background:var(--gray-100);color:var(--gray-600);cursor:pointer;border:1px solid var(--gray-200);transition:all 100ms;}
.stp:hover{background:var(--blue-bg);color:var(--blue);border-color:var(--blue);}

/* Gantt (detail) */
.gw{overflow-x:auto;margin-top:6px;}
.gt{border-collapse:collapse;min-width:500px;width:100%;}
.gt th{padding:5px 7px;font-size:10px;font-weight:700;color:var(--gray-500);background:var(--gray-50);border-bottom:1px solid var(--gray-200);white-space:nowrap;}
.gt td{padding:5px 7px;border-bottom:1px solid var(--gray-100);font-size:11px;vertical-align:middle;}
.gmt{text-align:center;min-width:50px;border-left:1px solid var(--gray-200);}
.gbc{position:relative;height:20px;border-left:1px solid var(--gray-100);}
.gbi{position:absolute;top:2px;height:14px;border-radius:3px;background:var(--blue);min-width:4px;}
.gbi.done{background:var(--green);}
.gbi.ms{background:var(--orange);width:4px!important;border-radius:50% 50% 50% 0;}

/* Schedule table */
.stbl{width:100%;border-collapse:collapse;}
.stbl th{font-size:10px;font-weight:700;color:var(--gray-500);text-transform:uppercase;padding:6px 10px;border-bottom:2px solid var(--gray-200);background:var(--gray-50);}
.stbl td{padding:7px 10px;font-size:12px;border-bottom:1px solid var(--gray-100);}

/* Toast */
.toast{position:fixed;bottom:18px;right:18px;padding:10px 16px;background:var(--green);color:#fff;border-radius:var(--rs);box-shadow:var(--sh-md);font-weight:700;font-size:12px;z-index:9999;animation:su 200ms ease-out;}
.toast.err{background:var(--red);}
@keyframes su{from{transform:translateY(50px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--gray-400);}

/* Views */
#vd,#vp,#vs{display:none;}
#vd.on,#vp.on,#vs.on{display:flex;flex-direction:column;gap:10px;}

@media(max-width:1300px){.kpi-row{grid-template-columns:repeat(3,1fr);}.sched-section{grid-template-columns:1fr;}.mid-row{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-logo">🛣️ 한국도로공사 <span class="sub">사업·업무 통합 관리 대시보드</span></div>
  <nav class="header-nav">
    <button class="nav-btn" onclick="sw('d')">대시보드</button>
    <button class="nav-btn" onclick="sw('p')">사업 목록</button>
    <button class="nav-btn" onclick="sw('s')">일정 관리</button>
  </nav>
  <div class="header-right">
    <span class="hdate" id="hdate"></span>
    <button class="btn btn-s" onclick="openSM()">+ 일정 등록</button>
    <button class="btn btn-p" onclick="openPM()">+ 사업 등록</button>
  </div>
</header>

<!-- MAIN -->
<main class="main">

  <!-- ===== DASHBOARD VIEW ===== -->
  <div id="vd" class="on">

    <!-- KPI ROW -->
    <div class="kpi-row" id="kpiRow"></div>

    <!-- SCHEDULE SECTION -->
    <div class="sched-section">
      <!-- Today -->
      <div class="card today-card">
        <div class="ch">
          <span class="ct">📅 오늘 일정 <span id="todayLbl" style="font-size:11px;color:var(--gray-400);font-weight:400;"></span></span>
          <div class="toggle-row">
            <button class="tgl on" id="tgMy" onclick="setTV('my')">내 일정</button>
            <button class="tgl" id="tgDept" onclick="setTV('dept')">부서 전체</button>
          </div>
        </div>
        <div class="cb"><div class="timeline" id="todayTL"></div></div>
      </div>

      <!-- Week Calendar -->
      <div class="card week-card">
        <div class="ch">
          <span class="ct">📆 이번주 일정</span>
          <span id="wrange" style="font-size:11px;color:var(--gray-400);"></span>
        </div>
        <div class="cb"><div class="wcal" id="wcal"></div></div>
      </div>
    </div>

    <!-- MIDDLE ROW: Risk + Deadlines -->
    <div class="mid-row">
      <!-- Risk Cards -->
      <div class="card" style="overflow:hidden;">
        <div class="ch">
          <span class="ct">⚠️ 위험 사업 <span class="cnt" id="riskCnt">0</span></span>
          <span style="font-size:11px;color:var(--gray-400);">종료임박·공정지연·관리필요</span>
        </div>
        <div class="risk-grid" id="riskGrid"></div>
      </div>

      <!-- Upcoming Deadlines -->
      <div class="card" style="overflow:hidden;">
        <div class="ch"><span class="ct">🗓 마감 임박</span></div>
        <div class="dl-list" id="dlList"></div>
      </div>

<script>
/* ─────────────────────────────
   STATE
───────────────────────────── */
const S={projects:[],schedules:[],cats:[],tv:'my',curProjId:null,editProjId:null,curTab:'info'};
const TODAY=new Date(); TODAY.setHours(0,0,0,0);

/* ─────────────────────────────
   STORAGE
───────────────────────────── */
function sv(){localStorage.setItem('rv3:p',JSON.stringify(S.projects));localStorage.setItem('rv3:s',JSON.stringify(S.schedules));localStorage.setItem('rv3:c',JSON.stringify(S.cats));}
function ld(){const p=localStorage.getItem('rv3:p'),s=localStorage.getItem('rv3:s'),c=localStorage.getItem('rv3:c');if(p)S.projects=JSON.parse(p);if(s)S.schedules=JSON.parse(s);if(c)S.cats=JSON.parse(c);}

/* ─────────────────────────────
   UTILS
───────────────────────────── */
function uid(){return '_'+Math.random().toString(36).slice(2,9);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtD(d){return d?d.replace(/-/g,'.').slice(0,10):'-';}
function fmtA(n){if(!n)return'-';if(n>=1e8)return(n/1e8).toFixed(1).replace(/\.0$/,'')+'억원';if(n>=1e4)return Math.round(n/1e4)+'만원';return n.toLocaleString()+'원';}
function dayUntil(ds){if(!ds)return null;const d=new Date(ds);d.setHours(0,0,0,0);return Math.ceil((d-TODAY)/86400000);}
function elapsedPct(p){if(!p.startDate||!p.endDate)return 0;const s=new Date(p.startDate),e=new Date(p.endDate),tot=e-s;if(tot<=0)return 100;return Math.round(Math.max(0,Math.min(TODAY-s,tot)/tot*100));}
function isRisk(p){if(p.status==='위험')return true;if(p.status==='완료')return false;const d=dayUntil(p.endDate);if(d!==null&&d<=30&&(p.progress||0)<80)return true;if(elapsedPct(p)-(p.progress||0)>20)return true;return false;}
function pColor(pct){return pct>=80?'var(--green)':pct>=40?'var(--blue)':'var(--orange)';}
function mgrTxt(arr){if(!arr||!arr.length)return'-';return arr.length===1?arr[0]:arr[0]+' 외 '+(arr.length-1)+'명';}
function statusBdg(p){const s=p.status||'진행중';if(s==='완료')return`<span class="bdg bdg-g">완료</span>`;if(s==='위험')return`<span class="bdg bdg-r">위험</span>`;if(s==='준비중')return`<span class="bdg bdg-x">준비중</span>`;if(isRisk(p))return`<span class="bdg bdg-o">위험</span>`;return`<span class="bdg bdg-b">진행중</span>`;}
function midDate(s,e){const a=new Date(s),b=new Date(e);return new Date((a.getTime()+b.getTime())/2).toISOString().slice(0,10);}

/* ─────────────────────────────
   VIEW SWITCH
───────────────────────────── */
function sw(v){
  document.getElementById('vd').classList.toggle('on',v==='d');
  document.getElementById('vp').classList.toggle('on',v==='p');
  document.getElementById('vs').classList.toggle('on',v==='s');
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',['d','p','s'][i]===v));
  if(v==='s')rSchedTable();
  if(v==='p'){rt2();}
}

/* ─────────────────────────────
   HEADER LABELS
───────────────────────────── */
function initLabels(){
  const d=new Date();
  document.getElementById('hdate').textContent=`${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} (${'일월화수목금토'[d.getDay()]})`;
  document.getElementById('todayLbl').textContent=`${d.getMonth()+1}/${d.getDate()}(${'일월화수목금토'[d.getDay()]})`;
  const m=new Date(d);m.setDate(d.getDate()-((d.getDay()+6)%7));
  const sun=new Date(m);sun.setDate(m.getDate()+6);
  document.getElementById('wrange').textContent=`${m.getMonth()+1}/${m.getDate()} ~ ${sun.getMonth()+1}/${sun.getDate()}`;
}

/* ─────────────────────────────
   TODAY TIMELINE
───────────────────────────── */
function setTV(v){S.tv=v;document.getElementById('tgMy').classList.toggle('on',v==='my');document.getElementById('tgDept').classList.toggle('on',v==='dept');rToday();}
function rToday(){
  const ts=TODAY.toISOString().slice(0,10);
  let items=S.schedules.filter(s=>s.date===ts);
  if(S.tv==='my')items=items.filter(s=>s.type==='my');
  items.sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const tl=document.getElementById('todayTL');
  if(!items.length){tl.innerHTML='<div class="no-sched">오늘 일정이 없습니다</div>';return;}
  const now=new Date();
  const nowStr=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  tl.innerHTML=items.map(s=>{
    const past=s.time&&s.time<nowStr;
    const dept=s.type==='dept';
    return`<div class="tl-item${past?' past':''}${dept?' dept':''}">
      <span class="tl-time">${s.time||'종일'}</span>
      <span class="tl-text">${esc(s.title)}</span>
      <span class="tl-tag${dept?' dept':''}">${dept?'부서':'개인'}</span>
      <button class="tl-del" onclick="dSched('${s.id}',event)">✕</button>
    </div>`;
  }).join('');
}

/* ─────────────────────────────
   WEEK CALENDAR
───────────────────────────── */
function rWeek(){
  const d=new Date(TODAY);
  const dow=(d.getDay()+6)%7;
  const mon=new Date(d);mon.setDate(d.getDate()-dow);
  const days=Array.from({length:5},(_,i)=>{const dd=new Date(mon);dd.setDate(mon.getDate()+i);return dd;});
  const dn=['월','화','수','목','금'];
  document.getElementById('wcal').innerHTML=days.map((dd,i)=>{
    const str=dd.toISOString().slice(0,10);
    const isT=str===TODAY.toISOString().slice(0,10);
    const evs=S.schedules.filter(s=>s.date===str).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    const evHtml=evs.slice(0,5).map(e=>`<div class="wev${e.type==='dept'?' dept':''}" title="${esc(e.title)}">${e.time?e.time.slice(0,5)+' ':''}${esc(e.title)}</div>`).join('');
    const more=evs.length>5?`<div class="wmore">+${evs.length-5}개</div>`:'';
    return`<div class="wday${isT?' today':''}">
      <div class="wday-hd"><div class="dn">${dn[i]}</div><div class="dd">${dd.getDate()}</div></div>
      <div class="wday-body">${evHtml}${more}</div>
    </div>`;
  }).join('');
}

/* ─────────────────────────────
   KPI
───────────────────────────── */
function rKPI(){
  const total=S.projects.length;
  const prog=S.projects.filter(p=>p.status!=='완료').length;
  const done=S.projects.filter(p=>p.status==='완료').length;
  const risk=S.projects.filter(p=>isRisk(p)).length;
  const avg=total?Math.round(S.projects.reduce((s,p)=>s+(p.progress||0),0)/total):0;
  const amt=S.projects.reduce((s,p)=>s+(p.amount||0),0);
  document.getElementById('kpiRow').innerHTML=`
    <div class="kpi"><span class="kpi-icon">📁</span><div class="kpi-body"><div class="kpi-val c-blue">${total}</div><div class="kpi-lbl">총 사업 수</div><div class="kpi-sub">전체 등록 사업</div></div></div>
    <div class="kpi k-green"><span class="kpi-icon">▶</span><div class="kpi-body"><div class="kpi-val c-green">${prog}</div><div class="kpi-lbl">진행중</div><div class="kpi-sub">수행 중인 사업</div></div></div>
    <div class="kpi"><span class="kpi-icon">✅</span><div class="kpi-body"><div class="kpi-val">${done}</div><div class="kpi-lbl">완료</div><div class="kpi-sub">완료된 사업</div></div></div>
    <div class="kpi k-red"><span class="kpi-icon">⚠</span><div class="kpi-body"><div class="kpi-val c-red">${risk}</div><div class="kpi-lbl">위험 사업</div><div class="kpi-sub">관리 필요</div></div></div>
    <div class="kpi k-orange"><span class="kpi-icon">📊</span><div class="kpi-body"><div class="kpi-val c-orange">${avg}%</div><div class="kpi-lbl">평균 공정률</div><div class="kpi-bar"><div class="kpi-bar-fill" style="width:${avg}%;background:var(--orange);"></div></div></div></div>
    <div class="kpi k-teal"><span class="kpi-icon">💰</span><div class="kpi-body"><div class="kpi-val c-teal" style="font-size:16px;">${fmtA(amt)}</div><div class="kpi-lbl">총 계약금액</div><div class="kpi-sub">계약 합계</div></div></div>
  `;
}

/* ─────────────────────────────
   RISK CARDS
───────────────────────────── */
function rRisk(){
  const risks=S.projects.filter(p=>isRisk(p)&&p.status!=='완료');
  document.getElementById('riskCnt').textContent=risks.length;
  const g=document.getElementById('riskGrid');
  if(!risks.length){g.innerHTML='<div class="no-risk">현재 위험 사업이 없습니다</div>';return;}
  g.innerHTML=risks.map(p=>{
    const d=dayUntil(p.endDate);
    const dl=d!==null&&d<=30;
    const cls=p.status==='위험'||dl?'r-red':'r-orange';
    const tag=p.status==='위험'?'관리필요':dl?`D-${d}`:'공정지연';
    const pct=p.progress||0;
    const col=pColor(pct);
    return`<div class="rc ${cls}" onclick="openDetail('${p.id}')">
      <span class="rc-tag">${tag}</span>
      <div class="rc-name" title="${esc(p.name)}">${esc(p.name)}</div>
      <div class="rc-meta">${esc(p.contractor||'-')} · ${mgrTxt(p.managers)}</div>
      <div class="rc-pb"><div class="rc-pf" style="width:${pct}%;background:${col};"></div></div>
      <div class="rc-pct" style="color:${col};">${pct}%</div>
    </div>`;
  }).join('');
}

/* ─────────────────────────────
   DEADLINES
───────────────────────────── */
function rDeadlines(){
  const list=[...S.projects].filter(p=>p.status!=='완료'&&p.endDate)
    .sort((a,b)=>a.endDate.localeCompare(b.endDate)).slice(0,7);
  const dl=document.getElementById('dlList');
  if(!list.length){dl.innerHTML='<div style="padding:20px;text-align:center;font-size:12px;color:var(--gray-400);">사업이 없습니다</div>';return;}
  dl.innerHTML=list.map(p=>{

function getFiltered(siId,stFId,ctFId,soFId){
  const q=(document.getElementById(siId)||{value:''}).value.toLowerCase();
  const st=(document.getElementById(stFId)||{value:''}).value;
  const ct=ctFId?(document.getElementById(ctFId)||{value:''}).value:'';
  const so=(document.getElementById(soFId)||{value:'name'}).value;
  let list=S.projects.filter(p=>{
    const m=!q||p.name.toLowerCase().includes(q)||(p.contractor||'').toLowerCase().includes(q)||(p.managers||[]).some(m=>m.toLowerCase().includes(q));
    const ms=!st||(st==='위험'?isRisk(p):p.status===st);
    const mc=!ct||p.category===ct;
    return m&&ms&&mc;
  });
  list.sort((a,b)=>{
    if(so==='risk')return(isRisk(b)?1:0)-(isRisk(a)?1:0);
    if(so==='progress')return(b.progress||0)-(a.progress||0);
    if(so==='amount')return(b.amount||0)-(a.amount||0);
    if(so==='endDate')return(a.endDate||'').localeCompare(b.endDate||'');
    if(so==='manager')return mgrTxt(a.managers).localeCompare(mgrTxt(b.managers));
    return a.name.localeCompare(b.name);
  });
  return list;
}

/* Gantt */
function rGantt(p){
  const w=document.getElementById('ganttWrap');
  if(!p.startDate||!p.endDate){w.innerHTML='<div style="padding:20px;text-align:center;color:var(--gray-400);">날짜 정보가 없습니다</div>';return;}
  const s=new Date(p.startDate);s.setDate(1);
  const e=new Date(p.endDate);e.setDate(1);
  const months=[];let cur=new Date(s);
  while(cur<=e){months.push(new Date(cur));cur.setMonth(cur.getMonth()+1);}
  if(!months.length)months.push(new Date(s));
  const rows=[{name:p.name,sd:p.startDate,ed:p.endDate,done:p.status==='완료',ms:false},...(p.stages||[]).map(s=>({name:s.name,sd:s.date||p.startDate,ed:s.date||p.startDate,done:s.done,ms:true}))];
  let th=`<th style="min-width:130px;">단계</th>`;
  months.forEach(m=>th+=`<th class="gmt">${m.getMonth()+1}월</th>`);
  const tbody=rows.map(r=>{
    const rs=new Date(r.sd||p.startDate),re=new Date(r.ed||p.endDate);
    let td=`<td style="font-size:11px;">${esc(r.name)}</td>`;
    months.forEach(m=>{
      const ms2=new Date(m.getFullYear(),m.getMonth(),1),me=new Date(m.getFullYear(),m.getMonth()+1,0);
      const ov=rs<=me&&re>=ms2;
      if(!ov){td+=`<td class="gbc"></td>`;return;}
      const bs=Math.max(0,(rs-ms2)/(me-ms2+86400000)*100);
      const w2=Math.min(100-bs,(Math.min(re,me)-Math.max(rs,ms2)+86400000)/(me-ms2+86400000)*100);
      td+=`<td class="gbc"><div class="gbi${r.done?' done':''}${r.ms?' ms':''}" style="left:${bs.toFixed(1)}%;width:${Math.max(4,w2).toFixed(1)}%;"></div></td>`;
    });
    return`<tr>${td}</tr>`;
  }).join('');
  w.innerHTML=`<table class="gt"><thead><tr>${th}</tr></thead><tbody>${tbody}</tbody></table>`;
}
